[flake8]
max-line-length = 120
exclude =
    migrations,
    __pycache__,
    .git,
    .venv,
    venv,
    staticfiles
per-file-ignores =
    config/settings/*.py: F401, F403

[isort]
profile = black
line_length = 120
skip = migrations

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
